services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: logickids-backend
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    restart: unless-stopped

  frontend:
    build:
      context: ../logicKids-Frontend
      dockerfile: Dockerfile
    container_name: logickids-frontend
    environment:
      VITE_API_URL: http://localhost:3000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
